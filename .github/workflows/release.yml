name: Build Windows EXE & Release

# Dispara al empujar un tag de versión, p.ej.:  git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:   # permite lanzarlo a mano desde la pestaña Actions

permissions:
  contents: write       # necesario para crear el release

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install pyinstaller mido

      # onefile: cómodo (un solo .exe). Más propenso a falsos positivos de antivirus.
      - name: Compilar .exe (onefile)
        run: >
          pyinstaller --onefile --windowed --noupx
          --name midi2it
          --paths .
          --add-data "templates/bgm.it;templates"
          --collect-submodules core
          --collect-submodules gui
          --hidden-import midi2it_gui
          midi2it.py

      # onedir: carpeta con .exe + _internal. Mucho menos falsos positivos.
      - name: Compilar carpeta (onedir)
        run: >
          pyinstaller --onedir --windowed --noupx
          --name midi2it
          --paths .
          --distpath dist_dir
          --add-data "templates/bgm.it;templates"
          --collect-submodules core
          --collect-submodules gui
          --hidden-import midi2it_gui
          midi2it.py

      - name: Empaquetar carpeta onedir en zip
        run: Compress-Archive -Path dist_dir/midi2it/* -DestinationPath dist/midi2it-windows-folder.zip

      - name: Subir artefactos del build
        uses: actions/upload-artifact@v4
        with:
          name: midi2it-windows
          path: |
            dist/midi2it.exe
            dist/midi2it-windows-folder.zip

      - name: Crear release y adjuntar binarios
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/midi2it.exe
            dist/midi2it-windows-folder.zip
          body: |
            ## midi2it ${{ github.ref_name }}

            **Descargas:**
            - `midi2it.exe` — ejecutable único (cómodo). Algunos antivirus pueden
              marcarlo como falso positivo (típico de PyInstaller onefile).
            - `midi2it-windows-folder.zip` — versión en carpeta. **Menos falsos
              positivos**; descomprime y ejecuta `midi2it.exe` dentro.

            > ⚠️ La detección `Trojan:Win32/Wacatac.B!ml` es un **falso positivo**
            > heurístico habitual en binarios PyInstaller. El código es abierto y
            > sin red. Si Defender lo bloquea: usa el zip, o restaura el archivo
            > desde *Protección contra virus → Historial de protección → Permitir*.
          generate_release_notes: true
