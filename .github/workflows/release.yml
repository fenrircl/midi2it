name: Build Windows EXE & Release

# Dispara al empujar un tag de versión, p.ej.:  git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:   # permite lanzarlo a mano desde la pestaña Actions

permissions:
  contents: write       # necesario para crear el release

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: pip install pyinstaller mido

      - name: Compilar .exe
        run: >
          pyinstaller --onefile --windowed
          --name midi2it
          --add-data "templates/bgm.it;templates"
          midi2it.py

      - name: Subir artefacto del build
        uses: actions/upload-artifact@v4
        with:
          name: midi2it-windows
          path: dist/midi2it.exe

      - name: Crear release y adjuntar .exe
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/midi2it.exe
          generate_release_notes: true
